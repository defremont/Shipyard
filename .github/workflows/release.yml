name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cmd: pnpm dist:linux
          - os: macos-latest
            cmd: pnpm dist:mac
          - os: windows-latest
            cmd: pnpm dist:win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Linux build dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y dpkg fakeroot rpm

      - name: Install dependencies (skip native modules)
        run: pnpm install --ignore-scripts
        env:
          npm_config_optional: false

      - name: Build and package
        run: ${{ matrix.cmd }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CSC_IDENTITY_AUTO_DISCOVERY: false
          DEBUG: electron-builder

      - name: List release artifacts
        if: always()
        shell: bash
        run: ls -lah release/ 2>/dev/null || echo "No release directory"

      - name: Upload release assets
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          generate_release_notes: true
          files: |
            release/*.exe
            release/*.dmg
            release/*.AppImage
            release/*.deb
