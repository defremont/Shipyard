appId: com.shipyard.dev
productName: Shipyard
copyright: Copyright © 2026 Shipyard Contributors. Apache-2.0

directories:
  output: release
  buildResources: assets

# Include compiled server, built client, and electron main
files:
  - electron/dist/**/*
  - server/dist/**/*
  - server/package.json
  - client/dist/**/*
  - package.json
  - "!**/node_modules/**"

# Server deps installed separately via beforePack
extraResources:
  - from: assets/icon.png
    to: icon.png

# Asar disabled: server runs as child process (plain Node) and can't read from asar archives
asar: false

compression: maximum

# Don't rebuild native modules for Electron (server runs as child process)
npmRebuild: false

# Install production deps after packaging (pnpm symlinks don't survive asar)
afterPack: ./electron/afterPack.js

win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
  artifactName: "${productName}-Setup-${version}.${ext}"

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Shipyard
  uninstallDisplayName: Shipyard

mac:
  target:
    - target: dmg
      arch: [x64, arm64]
  icon: assets/icon.icns
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-${arch}.${ext}"

dmg:
  title: Shipyard
  contents:
    - x: 130
      y: 220
    - x: 410
      y: 220
      type: link
      path: /Applications

linux:
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  icon: assets/icon.png
  category: Development
  artifactName: "${productName}-${version}.${ext}"
  executableName: shipyard
  desktop:
    entry:
      Name: Shipyard
      Comment: Local Development Dashboard
      Categories: Development;IDE;
      StartupWMClass: shipyard

appImage:
  license: LICENSE

deb:
  depends:
    - libgtk-3-0
    - libnotify4
    - libnss3
    - libxss1
    - libxtst6
    - xdg-utils
